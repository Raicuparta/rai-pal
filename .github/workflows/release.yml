name: "release"

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  release-matrix:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            os-name: windows
          - platform: ubuntu-24.04
            # pinning to ubuntu 24 due to bug: https://github.com/audioling/audioling/issues/40
            os-name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: "npm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-0=2.44.0-2 \
            libwebkit2gtk-4.1-dev=2.44.0-2 \
            libjavascriptcoregtk-4.1-0=2.44.0-2 \
            libjavascriptcoregtk-4.1-dev=2.44.0-2 \
            gir1.2-javascriptcoregtk-4.1=2.44.0-2 \
            gir1.2-webkit2-4.1=2.44.0-2 \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Release
        id: build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          ANALYTICS_API_KEY: ${{ secrets.ANALYTICS_API_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseDraft: true
          prerelease: false
          assetNamePattern: "RaiPal.[ext]"
          includeUpdaterJson: false

      - name: Generate Updater Partial
        run: node scripts/generate-updater-json.js ${{ steps.build.outputs.appVersion }} ${{ github.repository_owner }} ${{ github.event.repository.name }}

      - name: Upload Updater Partial
        uses: actions/upload-artifact@v4
        with:
          name: updater-partial-${{ matrix.os-name }}
          path: updater-partial-*.json

  upload-updater:
    needs: release-matrix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25

      - name: Download Updater Partials
        uses: actions/download-artifact@v4
        with:
          path: updater-partials
          pattern: updater-partial-*

      - name: Merge Updater JSON
        id: merge
        run: node scripts/merge-updater-json.js updater-partials

      - name: Generate Release Body
        id: body
        run: node scripts/generate-release-body.js ${{ steps.merge.outputs.version }}

      - name: Upload Updater JSON
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.merge.outputs.version }}
          body_path: ${{ steps.body.outputs.body_path }}
          files: latest.json
          draft: true
